<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Nexflow Dashboard</title>
<style>
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: #FDEDEF; /* fond doux rose clair */
    color: #1A1A1A; 
    margin: 0; padding: 20px;
}
h1 { color: #F4A6B8; margin: 0 0 20px 0; font-size: 28px; }
.container { max-width: 1400px; margin: 0 auto; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
.card { background-color: #FFF; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.card h2 { margin-top: 0; color: #F4A6B8; font-size: 18px; }
.progress-bar { background-color: #F5F5F5; border-radius: 8px; height: 20px; overflow: hidden; margin-top: 10px; }
.progress { background-color: #F4A6B8; height: 100%; width: 0%; transition: width 0.5s ease; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 12px; overflow: hidden; background: #FFF; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
th { background-color: #F5F5F5; }
tr:hover { background-color: rgba(244,166,184,0.1); }
a { color: #E8A0BF; text-decoration: none; }
a:hover { text-decoration: underline; }
.status { font-weight: bold; border-radius: 4px; padding: 2px 6px; text-align: center; }
.envoye { color: #1A1A1A; background-color: #F4A6B8; }
.repondu { color: #FFF; background-color: #2C7A7B; }
.relancer { color: #FFF; background-color: #D53F8C; }
.filters { margin-bottom: 10px; }
.filters button { margin-right: 5px; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; background-color: #F4A6B8; color: #1A1A1A; }
.filters button.active { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.footer { margin-top: 40px; font-size: 12px; color: #888; text-align: center; }
</style>
</head>
<body>
<h1>Nexflow</h1>
<div class="container">

<div class="stats">
    <div class="card">
        <h2>Emails envoyés</h2>
        <p id="emails-envoyes">0</p>
    </div>
    <div class="card">
        <h2>Objectif mensuel</h2>
        <p id="objectif-mois">75</p>
    </div>
    <div class="card">
        <h2>Contacts uniques</h2>
        <p id="contacts-uniques">0</p>
    </div>
    <div class="card">
        <h2>Villes couvertes</h2>
        <p id="villes-couvertes">0</p>
    </div>
</div>

<div class="stats">
    <div class="card">
        <h2>Progression mensuelle</h2>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <p id="progress-text">0%</p>
    </div>
    <div class="card">
        <h2>Dernier envoi</h2>
        <p id="dernier-envoi">Aucun</p>
    </div>
</div>

<div class="filters">
    <button onclick="filterStatus('all')" class="active">Tous</button>
    <button onclick="filterStatus('envoye')">Envoyé</button>
    <button onclick="filterStatus('repondu')">Répondu</button>
    <button onclick="filterStatus('relancer')">À relancer</button>
</div>

<table>
    <thead>
        <tr>
            <th>Nom</th>
            <th>Ville</th>
            <th>Site</th>
            <th>Email</th>
            <th>Sujet</th>
            <th>Statut</th>
            <th>Réponse reçue</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
</table>

</div>
<div class="footer">Dashboard Nexflow | Mis à jour automatiquement</div>

<script>
// ✅ Google Sheet déjà configuré pour toi
const URL = "https://raw.githubusercontent.com/Nexfloww/Nexflow-Dashboard/main/historique.json";

let dataGlobal = [];

function fetchData() {
    fetch(URL)
        .then(res => res.json())
        .then(data => {
            dataGlobal = data;
            updateDashboard();
            populateTable(data);
        })
        .catch(err => console.error("Erreur fetching Google Sheet:", err));
}

function updateDashboard() {
    const emailsEnvoyes = dataGlobal.length;
    const objectif = 75;
    const contactsUniques = [...new Set(dataGlobal.map(d => d.nom))].length;
    const villes = [...new Set(dataGlobal.map(d => d.ville))].length;

    document.getElementById("emails-envoyes").innerText = emailsEnvoyes;
    document.getElementById("contacts-uniques").innerText = contactsUniques;
    document.getElementById("villes-couvertes").innerText = villes;
    document.getElementById("progress").style.width = Math.min((emailsEnvoyes / objectif)*100, 100) + "%";
    document.getElementById("progress-text").innerText = Math.floor((emailsEnvoyes / objectif)*100) + "%";
    document.getElementById("dernier-envoi").innerText = emailsEnvoyes ? dataGlobal[dataGlobal.length-1].date : "Aucun";
}

function populateTable(data) {
    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";
    data.forEach(d => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${d.nom}</td>
            <td>${d.ville}</td>
            <td><a href="${d.site}" target="_blank">Voir site</a></td>
            <td><a href="mailto:${d.email || ''}">${d.email || '-'}</a></td>
            <td>${d.sujet}</td>
            <td class="status ${d.statut.toLowerCase()}">${d.statut}</td>
            <td>${d.reponse || "Non"}</td>
            <td>${d.date}</td>
        `;
        tr.dataset.statut = d.statut.toLowerCase();
        tbody.appendChild(tr);
    });
}

function filterStatus(status) {
    const buttons = document.querySelectorAll(".filters button");
    buttons.forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    const rows = document.querySelectorAll("#table-body tr");
    rows.forEach(row => {
        if(status === "all" || row.dataset.statut === status) row.style.display = "";
        else row.style.display = "none";
    });
}

// fetch toutes les 60s pour mise à jour auto
fetchData();
setInterval(fetchData, 60000);

</script>
</body>
</html>
